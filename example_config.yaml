timezone: US/Mountain
outline:
  single:
    primary_outline_file: outline/book{book_num}/book{book_num}-scenes.md
    primary_outline_type: scenes
    output_dir: outline/book{book_num}
    output_name: book{book_num}-{{outline_type}}.md
  series:
    source_outline_glob: outline/book*/book*-scenes.md
    source_outline_regex: "book(?P<book_num>\d+)"
    primary_outline_type: scenes
    output_dir: outline/series
    output_name: series-{{outline_type}}.md
convert:
  metadata_path:
    default: skeleton/book{book_num}-metadata.txt
    shunn-docx: skeleton/book{book_num}-metadata-docx.txt
  frontmatter_files:
    Copyright: skeleton/Book {book_num} Copyright.md
    Dedication: skeleton/Book {book_num} Dedication.md
  backmatter_files: {}
  css:
    # css_dir: path/to/css/
    manuscript_pdf_css_path: "pdf-light.css"
    misc_pdf_css_path: "pdf-misc.css"
    epub_css_path: "epub.css"
  # markdown_template_dir: path/to/templates/
  shunn_repo_url: https://github.com/escapewindow/pandoc-templates
  shunn_repo_path: null
find_files_by_name_cmd: ["fd", "-s"]
find_files_by_content_cmd: ["rg", "-l"]
